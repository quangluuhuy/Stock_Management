<h2>Stockout Manager</h2>

<input id="part" placeholder="Part Number">
<input id="serial" placeholder="Serial Number">
<input id="desc" placeholder="Description">
<input id="status" placeholder="Status">
<input id="owner" placeholder="Part Owner">
<input id="contract" placeholder="Contract">
<input id="borrow" placeholder="Contract mượn">
<input id="date" type="date">

<button onclick="addItem()">Add</button>

<br><br>

<input type="month" id="month">
<button onclick="exportExcel()">Export Excel</button>

<table border="1">
  <thead>
    <tr>
      <th>Part Number</th>
      <th>Serial Number</th>
      <th>Description</th>
      <th>Status</th>
      <th>Part Owner</th>
      <th>Contract</th>
      <th>Contract mượn</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>
